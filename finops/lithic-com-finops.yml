description: >-
  FinOps view of Lithic spend. Lithic's economics are not a simple per-call API
  bill - a program's cost/revenue is dominated by card-network interchange
  (Lithic shares a portion of interchange revenue back to the program) net of
  negotiated per-card, per-transaction, ACH origination, and enterprise
  add-on fees (Disputes, Settlement). Exact rates and revenue-share splits are
  negotiated per program (Processing vs. Program Managed) and are not publicly
  disclosed, so this artifact models the cost dimensions rather than reconciled
  unit rates.
notes: >-
  Verify current interchange revenue share, per-card, and per-transaction
  rates directly with a Lithic account executive; they are not published and
  vary by program model, card network, and volume commitments.
