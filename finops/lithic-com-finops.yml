meters:
- name: interchange_revenue_share
  description: Portion of card-network interchange revenue shared back to the program per settled transaction, net of Lithic's take.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - card_program
  - network
- name: active_cards
  description: Per-card fees, typically assessed per active/issued card per period.
  unit: cards
  aggregation: count
  dimensions:
  - account
  - card_program
- name: authorization_transactions
  description: Authorization and clearing transaction volume processed through the issuer-processing platform.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - card_program
- name: ach_originations
  description: ACH payment originations and returns via the Payments API and external bank accounts.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - financial_account
- name: disputes_processed
  description: Chargebacks and v2 managed disputes processed under the Enterprise Disputes API add-on.
  unit: disputes
  aggregation: count
  dimensions:
  - account
  - card_program
- name: settlement_reporting
  description: Enterprise, production-only Settlement API usage - settlement detail, summary, and network total reports reconciled.
  unit: reports
  aggregation: count
  dimensions:
  - account
- name: sandbox_usage
  description: Sandbox environment usage during development; free, but tracked for FinOps visibility into pre-production testing volume.
  unit: requests
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Reconcile daily settlement reports and funding events against transaction and interchange volume per card program.
- name: Allocation
  description: Tag financial accounts, card programs, and API keys per product/team so interchange revenue and fees map to internal cost centers.
- name: Optimization
  description: Route card programs to the interchange category (debit, prepaid, commercial, credit) and network that maximizes revenue share for the transaction mix; consolidate ACH batches to reduce origination fees.
- name: Accountability
  description: Assign a program owner responsible for the Processing vs. Program Managed commercial agreement and monthly review of interchange, fee, and dispute economics against forecast.
