components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Raw API secret key value (not prefixed with "Bearer").
  responses:
    Unauthorized:
      description: Missing or invalid API key.
    ValidationError:
      description: The request failed validation.
  schemas:
    3DS:
      type: object
      description: "3D Secure e-commerce authentication and decisioning."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
    Account:
      type: object
      description: "Top-level program accounts and their spend limits."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
    AccountHolder:
      type: object
      description: "KYC/KYB onboarding and management of individual and business account holders."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
    AuthStreamAccessASA:
      type: object
      description: "Real-time HTTP webhook authorization decisioning in the transaction path."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
    AuthRules:
      type: object
      description: "Programmable v2 authorization rules, versions, drafts, backtests, and evaluation results."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
    Balance:
      type: object
      description: "Available and pending balances for financial accounts."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
    BookTransfer:
      type: object
      description: "Internal ledger transfers between financial accounts."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
    Card:
      type: object
      description: "Virtual and physical card issuance, lifecycle, and digital wallet provisioning."
      properties:
        token:
          type: string
          format: uuid
          description: Globally unique identifier for the object.
        created:
          type: string
          format: date-time
      additionalProperties: true
