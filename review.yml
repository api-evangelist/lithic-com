sources:
  - url: https://github.com/lithic-com/lithic-openapi
    type: OpenAPI
    note: Real, published Apache-2.0 OpenAPI 3.1 specification (lithic-openapi.yml, ~1.1MB, 171 paths across 30 tags) backing Lithic's official SDKs; all endpointsConfirmedRest above were read directly from this file.
  - url: https://docs.lithic.com/docs/api-basics
    type: Documentation
    note: Production base URL https://api.lithic.com/v1, Authorization-header API key auth, cursor pagination.
  - url: https://docs.lithic.com/docs/rate-limits
    type: Documentation
    note: Numeric per-resource, per-method RPS limits; all REST, 429 on throttle.
  - url: https://docs.lithic.com/docs/auth-stream-access-asa
    type: Documentation
    note: ASA is a synchronous HTTP POST to a registered responder endpoint, 6-second timeout, optional HMAC signing. Not WebSocket.
  - url: https://docs.lithic.com/docs/events-api
    type: Documentation
    note: Events API webhooks are asynchronous, at-least-once HTTP POST notifications, not a persistent connection.
  - url: https://docs.lithic.com/docs/disputes-api
    type: Documentation
    note: Disputes API documented as an Enterprise product; REST only.
  - url: https://docs.lithic.com/docs/settlement-reporting
    type: Documentation
    note: Settlement API documented as an Enterprise, production-only REST reporting surface.
  - url: https://github.com/lithic-com/asa-demo-node
    type: SourceCode
    note: Open-source demo of an ASA responder implemented as a plain HTTP server.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists anywhere in Lithic's published
    OpenAPI specification or documentation. Lithic's real-time behavior (ASA,
    3DS Decisioning, Tokenization Decisioning, and standard Events webhooks)
    is implemented entirely as HTTP POST callbacks - synchronous
    request/response for the time-critical decisioning surfaces, asynchronous
    fire-and-forget for event notifications. No AsyncAPI document was created
    because current scope reserves AsyncAPI for SSE; plain webhook callbacks
    are documented here in findings.transports instead.
