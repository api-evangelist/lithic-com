aid: lithic-com
name: Lithic
review:
  question: Does Lithic expose a documented public WebSocket API?
  answer: false
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Lithic's real-time surfaces - Auth
    Stream Access (ASA), 3DS Decisioning, Tokenization Decisioning, and the
    Events API - are all HTTP webhook/callback mechanisms (Lithic makes a
    synchronous POST to a URL the customer registers, or an asynchronous POST
    for events) rather than a server-push transport like WebSocket or SSE.
    Per API Evangelist's updated 2026-05-29 scope, AsyncAPI is used to model
    SSE; it is not used to model plain HTTP webhook callbacks, so no AsyncAPI
    document was created for Lithic.
findings:
  summary: |
    Lithic does not publish a documented public WebSocket API. Lithic is a
    card issuing / issuer-processor API (base https://api.lithic.com/v1 in
    production, https://sandbox.lithic.com/v1 in Sandbox), authenticated with
    an API key sent as the raw value of the Authorization header. The entire
    documented surface - Account Holders, Accounts, Cards, Transactions, Auth
    Rules, Disputes, Financial Accounts, Payments, Tokenizations, and more -
    is request/response REST over HTTPS.
    Lithic's real-time authorization decisioning, called Auth Stream Access
    (ASA), is explicitly HTTP, not WebSocket: during authorization Lithic
    sends transaction metadata as an HTTP POST to a responder endpoint the
    customer registers (POST/GET/DELETE /v1/responder_endpoints), and expects
    a synchronous HTTP 200 response containing a result field (APPROVED,
    CHALLENGE, or a decline reason) within 6 seconds (Lithic recommends
    responding within 3 seconds to avoid merchant/acquirer-side timeouts and
    subsequent voids). ASA requests can optionally be HMAC-signed with
    webhook-id / webhook-timestamp / webhook-signature headers, using the same
    verification scheme as the Events API. The 3DS Decisioning webhook and the
    Tokenization Decisioning webhook (for Apple Pay / Google Pay / Samsung Pay
    provisioning approvals) follow the same synchronous HTTP callback pattern
    with their own rotatable HMAC secrets. Standard notifications (60+ event
    types - card, transaction, dispute, tokenization, financial account,
    settlement, etc.) are delivered asynchronously and at-least-once via the
    Events API's webhook event subscriptions, which is a fire-and-forget HTTP
    POST, not a persistent connection. No realtime, bidirectional, or
    streaming WebSocket (ws:// or wss://) endpoint is documented anywhere in
    Lithic's published OpenAPI specification (github.com/lithic-com/lithic-openapi)
    or developer documentation as of the review date.
  openSource: |
    Lithic's core platform is not open source; it is a commercial,
    contact-sales / underwriting-gated issuer-processing platform. Lithic does
    publish an open-source (Apache-2.0) OpenAPI 3.1 specification repository
    (github.com/lithic-com/lithic-openapi) that generates its official Node,
    Python, Go, Java, and Kotlin SDKs, plus open-source ASA responder demo
    apps (asa-demo-node, asa-demo-python).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.lithic.com/v1
      documented: true
      note: Primary documented surface for nearly all resources (v1); Auth Rules and Managed Disputes use a /v2 prefix on the same host.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Events API delivers 60+ event types asynchronously, at-least-once, via HTTP POST to a registered event subscription URL. Subscriptions auto-disable after 5 days of continuous failure.
    - protocol: Synchronous Webhook (Real-Time Decisioning)
      scheme: https
      documented: true
      note: Auth Stream Access (ASA), 3DS Decisioning, and Tokenization Decisioning each POST to a customer-registered endpoint and require a synchronous HTTP 200 decision response within a documented time budget (6-second hard timeout for ASA).
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Lithic's API reference, guides, or published OpenAPI specification as of the review date.
