aid: lithic-com
url: https://raw.githubusercontent.com/api-evangelist/lithic-com/refs/heads/main/apis.yml
name: Lithic
kind: company
description: Lithic is a card issuing and issuer-processor API platform for building
  virtual and physical card programs - authorization, clearing, KYC/KYB account
  holder onboarding, programmable authorization rules, real-time Auth Stream Access
  (ASA) decisioning, disputes, digital wallet tokenization, 3DS authentication,
  ACH payments, ledgered financial accounts, and settlement reporting. Lithic
  publishes a full OpenAPI 3.1 specification (github.com/lithic-com/lithic-openapi)
  backing official Node, Python, Go, Java, and Kotlin SDKs, with a sandbox at
  sandbox.lithic.com that mirrors production functionality.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Fintech
- Card Issuing
- Payments
- Issuer Processor
- KYC
- Banking as a Service
created: '2026-07-02'
modified: '2026-07-02'
specificationVersion: '0.19'
